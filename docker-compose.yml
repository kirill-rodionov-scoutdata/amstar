services:
  app:
    container_name: amstar
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -c "alembic upgrade head && python manage.py run-server"
    ports:
      - "8200:8200"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env_defaults
      - .env

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: amstar_db
      MYSQL_USER: app
      MYSQL_PASSWORD: password
    volumes:
      - amstar_db:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword"]
      interval: 3s
      timeout: 5s
      retries: 10

volumes:
  amstar_db:
